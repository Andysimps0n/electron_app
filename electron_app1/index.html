<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Focus</title>
    <link rel="icon" type="image/png" href="/src/assets/icon.png" />
    <!-- Apply theme before React boots so the first paint matches the OS / saved preference. -->
    <script>
      (function () {
        var saved = localStorage.getItem('themePreference')
        var preference =
          saved === 'light' || saved === 'dark' || saved === 'system'
            ? saved
            : 'system'
        var theme =
          preference === 'system'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : preference
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
